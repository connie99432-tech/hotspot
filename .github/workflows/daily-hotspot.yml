name: daily-hotspot
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}
jobs:
  gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: gen
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DILIAO_B64: ${{ secrets.DILIAO_B64 }}
        run: python scripts/generate.py
      - name: commit
        run: |
          git config user.name "hotspot-bot"
          git config user.email "bot@users.noreply.github.com"
          git add briefing.json
          git commit -m "daily briefing" || echo "no change"
          git push
